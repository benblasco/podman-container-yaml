# Superseded by templates/pod/pod-homepage.yml.j2 when using the playbook.
# The playbook injects files/homepage-config/services.yaml into the init container
# via homepage_services_yaml (single source of truth). Edit that file, not this one.
apiVersion: v1
kind: Pod
metadata:
  name: homepage
  labels:
    io.containers.autoupdate: "registry"
spec:
  containers:
    - name: homepage
      image: ghcr.io/gethomepage/homepage:latest
      ports:
        - containerPort: 3000
          hostPort: 3000
      volumeMounts:
        - mountPath: /app/config
          name: homepage-config
      env:
        - name: TZ
          value: Australia/Melbourne
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: '*'
      livenessProbe:
        httpGet:
          path: /
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: homepage-config
      persistentVolumeClaim:
        claimName: homepage-config
