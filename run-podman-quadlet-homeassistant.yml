---
- name: Run the podman system role
  hosts: micro.lan
  become: true
  vars:
    # homeassistant_mcp_token (and optional homeassistant_mcp_url): host_vars/micro.lan/homeassistant.yml
    # See host_vars/micro.lan/homeassistant.yml.example
    podman_run_as_user: root
    podman_run_as_group: root
    podman_firewall:
      - port: 8123/tcp
        state: enabled
      # UDP Ports 6666 and 6667 for LocalTuya discovery
      # https://github.com/rospogrigio/localtuya/issues/1742
      - port: 6666/udp
        state: enabled
      - port: 6667/udp
        state: enabled
      # Ports required for unofficial HA MCP server:
      # https://github.com/homeassistant-ai/ha-mcp
      - port: 8086/tcp
        state: enabled

    podman_quadlet_specs:
      # The yml files need to be defined before
      # the kube file that references them.
      # The other directives need to be under
      # the kube file_src else this does not work!
      - template_src: pod/pod-homeassistant.yml.j2
      - file_src: kube/homeassistant.kube
        # Setting the state to created because we have to
        # change ownership of files in volumes due to this bug
        # when using userns=keep-id:
        # "podman run is not honoring --userns=keep-id --user=1000:1000 settings while creating volumes"
        # https://github.com/containers/podman/issues/16741
        state: created
  roles:
    - fedora.linux_system_roles.podman
