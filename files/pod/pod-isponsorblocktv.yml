apiVersion: v1
kind: Pod
metadata:
  name: isponsorblocktv
  labels:
    io.containers.autoupdate: "registry"
spec:
  containers:
    - name: isponsorblocktv
      image: ghcr.io/dmunozv04/isponsorblocktv:latest
      #ports:
        #- containerPort: 3001
          #hostPort: 3001
      volumeMounts:
        - mountPath: /app/data
          name: isponsorblocktv-configdata
      env:
        - name: TZ
          value: Australia/Melbourne
      # Since iSponsorBlockTV has no HTTP endpoint to hit, a liveness probe
      # needs to work differently. The most meaningful check is whether the
      # Python process is actually running. 
      livenessProbe:
        exec:
          command: ["/bin/sh", "-c", "/usr/bin/pgrep -f main.pyc"]
        initialDelaySeconds: 45
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: isponsorblocktv-configdata
      persistentVolumeClaim:
        claimName: isponsorblocktv-configdata

#podman run -d --name isponsorblocktv --restart=unless-stopped -v isponsorblocktv-configdata:/app/data ghcr.io/dmunozv04/isponsorblocktv
