apiVersion: v1
kind: Pod
metadata:
  name: jenkins
  labels:
    io.containers.autoupdate: "registry"
spec:
  containers:
    - name: jenkins
      image: docker.io/jenkins/jenkins:lts-jdk17
      ports:
        - containerPort: 8080
          hostPort: 18080
        - containerPort: 50000
          hostPort: 50000
      volumeMounts:
        - mountPath: /var/jenkins_home
          name: jenkins-home
        #- mountPath: /certs/client:ro
          #name: jenkins-docker-certs
      env:
        - name: TZ
          value: Australia/Melbourne
      livenessProbe:
        httpGet:
          path: /login
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: jenkins-home
      persistentVolumeClaim:
        claimName: jenkins-home
    #- name: jenkins-docker-certs
      #persistentVolumeClaim:
        #claimName: jenkins-docker-certs
