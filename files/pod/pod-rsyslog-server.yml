apiVersion: v1
kind: Pod
metadata:
  name: rsyslog-server
  labels:
    #io.containers.autoupdate: "registry"
spec:
  containers:
    - name: rsyslog-server
      image: registry.redhat.io/rhel9/rsyslog:latest
      ports:
        - containerPort: 514
          hostPort: 10514
      volumeMounts:
        - mountPath: /etc/rsyslog.d/
          name: rsyslog-server-conf-d
        - mountPath: /var/log/
          name: rsyslog-server-var-log
      env:
        - name: TZ
          value: Australia/Melbourne
      # tcpSocket probes are implemented by podman kube play by running nc
      # inside the container. Since nc is not installed in this image, use
      # bash's built-in /dev/tcp redirect instead - no external tools needed.
      livenessProbe:
        exec:
          command:
            - /bin/bash
            - -c
            - </dev/tcp/127.0.0.1/514
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
  volumes:
    - name: rsyslog-server-conf-d
      persistentVolumeClaim:
        claimName: rsyslog-server-conf-d
    - name: rsyslog-server-var-log
      persistentVolumeClaim:
        claimName: rsyslog-server-var-log
